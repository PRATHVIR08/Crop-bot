<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CropBot App</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="app-body">

  <div class="app-container">
    
    <!-- Header -->
    <header class="app-header">
      <div class="header-content">
        <img src="cropbotbranding.png" alt="CropBot Logo" class="app-logo">
        <h1 class="app-title">CropBot AI</h1>
      </div>
      <button class="logout-btn" onclick="window.location.href='index.html'">Logout</button>
    </header>

    <!-- Chat Section -->
    <main class="chat-main">
      <div class="reply-section" id="reply">
        <!-- Messages will be injected here -->
        <div class="message bot">Hello! I'm Cropbot, an agriculture expert. Ask me a farming question or drag and drop a plant image below to detect diseases.</div>
      </div>
    </main>

    <!-- Input Section -->
    <footer class="input-container">
      <div class="input-wrapper">
        
        <!-- Drag & Drop Zone -->
        <div class="dropzone" id="image-dropzone" title="Drag & Drop Image or Click to Upload">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
          <input type="file" id="image-input" accept="image/*" hidden>
        </div>

        <!-- Text Input -->
        <input
          type="text"
          id="message"
          placeholder="Ask a farming question..."
          autocomplete="off"
        />
        <button class="send-btn" onclick="sendMessage()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" class="send-icon">
            <path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
